<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">CALO loop control flow</title>
  <desc id="desc">A goal brief becomes a task graph, TaskRun, operational pause, callback, judge and policy decision.</desc>
  <rect width="1200" height="520" rx="28" fill="#f6f7f9"/>
  <rect x="48" y="56" width="1104" height="408" rx="22" fill="#ffffff" stroke="#d6dbe3"/>
  <text x="86" y="112" fill="#1f2933" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="750">Goal-first orchestration without long Codex polling</text>
  <text x="86" y="148" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="16">The Orchestrator owns lifecycle state; long work is handed to an external owner with a wake path.</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(88 220)">
      <rect width="150" height="92" rx="14" fill="#eef6ff" stroke="#b8d4ff"/>
      <text x="20" y="36" fill="#1d4ed8" font-size="15" font-weight="750">Goal brief</text>
      <text x="20" y="62" fill="#475467" font-size="12">CLI / API / Web</text>
    </g>
    <path d="M252 266 H320" stroke="#98a2b3" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(334 220)">
      <rect width="150" height="92" rx="14" fill="#f8fafc" stroke="#d6dbe3"/>
      <text x="20" y="36" fill="#1f2933" font-size="15" font-weight="750">Task graph</text>
      <text x="20" y="62" fill="#475467" font-size="12">Planner output</text>
    </g>
    <path d="M498 266 H566" stroke="#98a2b3" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(580 220)">
      <rect width="150" height="92" rx="14" fill="#f8fafc" stroke="#d6dbe3"/>
      <text x="20" y="36" fill="#1f2933" font-size="15" font-weight="750">TaskRun</text>
      <text x="20" y="62" fill="#475467" font-size="12">External owner</text>
    </g>
    <path d="M744 266 H812" stroke="#98a2b3" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(826 220)">
      <rect width="150" height="92" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="20" y="36" fill="#b45309" font-size="15" font-weight="750">Operational pause</text>
      <text x="20" y="62" fill="#475467" font-size="12">Codex released</text>
    </g>
    <path d="M980 266 H1048" stroke="#98a2b3" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(880 354)">
      <rect width="218" height="54" rx="12" fill="#ecfdf3" stroke="#abefc6"/>
      <text x="20" y="33" fill="#138a54" font-size="14" font-weight="750">Callback wakes Judge + Policy</text>
    </g>
    <path d="M1050 312 C1050 338 1032 354 1008 354" fill="none" stroke="#98a2b3" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(86 382)">
    <rect width="450" height="42" rx="12" fill="#111827"/>
    <text x="18" y="27" fill="#f9fafb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">calo goal --objective "Improve benchmark" --execution-mode async</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#98a2b3"/>
    </marker>
  </defs>
</svg>
